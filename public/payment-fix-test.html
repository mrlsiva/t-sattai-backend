<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔧 Payment Intent Fix Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 5px solid #667eea;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .response {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.4;
            margin-top: 15px;
        }

        .success-box {
            background: #e8f5e8;
            border: 1px solid #4caf50;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            color: #2e7d32;
        }

        .error-box {
            background: #ffebee;
            border: 1px solid #f44336;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            color: #c62828;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🔧 Payment Intent Fix Test</h1>
            <p>Testing the updated payment calculation with dynamic tax system</p>
        </div>

        <!-- Login Section -->
        <div class="section">
            <h3>🔐 Login</h3>
            <div class="grid">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" value="user@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" value="password123">
                </div>
            </div>
            <button class="btn" onclick="login()">Login</button>
            <div id="loginResponse" class="response" style="display: none;"></div>
        </div>

        <!-- Cart Setup -->
        <div class="section">
            <h3>🛒 Cart Setup</h3>
            <div class="grid">
                <div class="form-group">
                    <label for="productId">Product ID:</label>
                    <input type="number" id="productId" value="1">
                </div>
                <div class="form-group">
                    <label for="quantity">Quantity:</label>
                    <input type="number" id="quantity" value="1" min="1">
                </div>
            </div>
            <button class="btn" onclick="addToCart()">Add to Cart</button>
            <button class="btn" onclick="getCart()">View Cart</button>
            <div id="cartResponse" class="response" style="display: none;"></div>
        </div>

        <!-- Checkout Calculation -->
        <div class="section">
            <h3>🧮 Calculate Checkout Totals</h3>
            <div class="grid">
                <div class="form-group">
                    <label for="country">Country:</label>
                    <input type="text" id="country" value="US" maxlength="2">
                </div>
                <div class="form-group">
                    <label for="state">State:</label>
                    <input type="text" id="state" value="NY" maxlength="10">
                </div>
            </div>
            <div class="grid">
                <div class="form-group">
                    <label for="city">City:</label>
                    <input type="text" id="city" value="New York">
                </div>
                <div class="form-group">
                    <label for="shippingMethod">Shipping Method:</label>
                    <select id="shippingMethod">
                        <option value="standard">Standard</option>
                        <option value="express">Express</option>
                        <option value="overnight">Overnight</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-success" onclick="calculateTotals()">Calculate Totals</button>
            <div id="totalsResponse" class="response" style="display: none;"></div>
        </div>

        <!-- Payment Intent Creation -->
        <div class="section">
            <h3>💳 Create Payment Intent</h3>
            <p><strong>This will use the calculated total from above to create a payment intent.</strong></p>
            <button class="btn btn-success" onclick="createPaymentIntent()">Create Payment Intent</button>
            <div id="paymentResponse" class="response" style="display: none;"></div>
        </div>

        <!-- Debug Info -->
        <div class="section">
            <h3>📊 Debug Information</h3>
            <div id="debugInfo" class="response">Ready to test payment fix...</div>
        </div>
    </div>

    <script>
        let authToken = '';
        let calculatedTotal = 0;
        let shippingAddress = {};

        function log(message, data = null) {
            const debugInfo = document.getElementById('debugInfo');
            const timestamp = new Date().toLocaleTimeString();
            let output = `[${timestamp}] ${message}\n`;

            if (data) {
                output += JSON.stringify(data, null, 2) + '\n';
            }
            output += '\n' + '='.repeat(60) + '\n\n';

            debugInfo.textContent = output + debugInfo.textContent;
        }

        async function apiRequest(endpoint, method = 'GET', body = null) {
            try {
                const options = {
                    method,
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                };

                if (authToken) {
                    options.headers['Authorization'] = `Bearer ${authToken}`;
                }

                if (body) {
                    options.body = JSON.stringify(body);
                }

                log(`🔄 ${method} ${endpoint}`, body);

                const response = await fetch(`/api${endpoint}`, options);
                const data = await response.json();

                if (response.ok) {
                    log(`✅ Success: ${data.message || 'Request completed'}`, data);
                    return data;
                } else {
                    log(`❌ Error ${response.status}: ${data.message || 'Unknown error'}`, data);
                    return data; // Return error data too for analysis
                }
            } catch (error) {
                log(`💥 Network error: ${error.message}`);
                return null;
            }
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const data = await apiRequest('/auth/login', 'POST', {
                email: email,
                password: password
            });

            if (data && data.success) {
                authToken = data.data.token;
                document.getElementById('loginResponse').style.display = 'block';
                document.getElementById('loginResponse').innerHTML = `
                    <div class="success-box">
                        ✅ Login successful!<br>
                        User: ${data.data.user.name}<br>
                        Token acquired.
                    </div>
                `;
            } else {
                document.getElementById('loginResponse').style.display = 'block';
                document.getElementById('loginResponse').innerHTML = `
                    <div class="error-box">
                        ❌ Login failed. Please check credentials.
                    </div>
                `;
            }
        }

        async function addToCart() {
            const productId = document.getElementById('productId').value;
            const quantity = document.getElementById('quantity').value;

            const data = await apiRequest('/cart', 'POST', {
                product_id: parseInt(productId),
                quantity: parseInt(quantity)
            });

            if (data) {
                document.getElementById('cartResponse').style.display = 'block';
                document.getElementById('cartResponse').textContent = JSON.stringify(data, null, 2);
            }
        }

        async function getCart() {
            const data = await apiRequest('/cart');

            if (data) {
                document.getElementById('cartResponse').style.display = 'block';
                document.getElementById('cartResponse').textContent = JSON.stringify(data, null, 2);
            }
        }

        async function calculateTotals() {
            shippingAddress = {
                country: document.getElementById('country').value,
                state: document.getElementById('state').value,
                city: document.getElementById('city').value,
                postal_code: '10001'
            };

            const requestData = {
                shipping_address: shippingAddress,
                shipping_method: document.getElementById('shippingMethod').value
            };

            const data = await apiRequest('/checkout/calculate-totals', 'POST', requestData);

            if (data && data.success) {
                calculatedTotal = data.data.total;
                document.getElementById('totalsResponse').style.display = 'block';
                document.getElementById('totalsResponse').innerHTML = `
                    <div class="success-box">
                        ✅ Totals calculated successfully!<br>
                        Subtotal: $${data.data.subtotal}<br>
                        Tax: $${data.data.tax.amount} (${data.data.tax.description})<br>
                        Shipping: $${data.data.shipping.cost}<br>
                        <strong>Total: $${data.data.total}</strong>
                    </div>
                `;
                log('📊 Total calculated for payment intent', {
                    calculatedTotal: calculatedTotal,
                    breakdown: data.data
                });
            } else {
                document.getElementById('totalsResponse').style.display = 'block';
                document.getElementById('totalsResponse').innerHTML = `
                    <div class="error-box">
                        ❌ Failed to calculate totals.
                    </div>
                `;
            }
        }

        async function createPaymentIntent() {
            if (!calculatedTotal) {
                alert('Please calculate totals first!');
                return;
            }

            const requestData = {
                amount: calculatedTotal,
                currency: 'usd',
                shipping_address: shippingAddress,
                shipping_method: document.getElementById('shippingMethod').value
            };

            log('💳 Creating payment intent with calculated total', requestData);

            const data = await apiRequest('/payments/create-intent', 'POST', requestData);

            if (data) {
                document.getElementById('paymentResponse').style.display = 'block';

                if (data.success) {
                    document.getElementById('paymentResponse').innerHTML = `
                        <div class="success-box">
                            ✅ Payment intent created successfully!<br>
                            Amount: $${data.data.amount}<br>
                            Payment Intent ID: ${data.data.payment_intent_id}<br>
                            Currency: ${data.data.currency}
                        </div>
                    `;
                } else {
                    document.getElementById('paymentResponse').innerHTML = `
                        <div class="error-box">
                            ❌ Payment intent failed: ${data.message}<br>
                            ${data.debug ? `Debug: Calculated $${data.debug.calculated_amount}, Requested $${data.debug.request_amount}, Difference $${data.debug.difference}` : ''}
                        </div>
                    `;
                }
            }
        }
    </script>
</body>

</html>
